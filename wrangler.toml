name = "sampires-glorious-typing-test"
main = "worker.js"
compatibility_date = "2025-09-27"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "."

# Keep KV bindings in source control so deploys cannot drop them.
# Replace the placeholder IDs below with your real KV namespace IDs from Cloudflare.
#
# Example:
# id = "0123456789abcdef0123456789abcdef"
# preview_id = "fedcba9876543210fedcba9876543210"

[[kv_namespaces]]
binding = "TYPING_APP"
id = "REPLACE_WITH_TYPING_APP_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_TYPING_APP_KV_PREVIEW_NAMESPACE_ID"
